# Netlify deployment configuration.
# The site is a plain static build, so most hosts work with just `build` + `dist`.

[build]
  command = "pnpm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20.11.0"
  # Netlify enables Corepack so the pinned pnpm version is used.
  NPM_FLAGS = "--version"

# Security + caching headers live in public/_headers (copied into dist/).
# Redirects live in public/_redirects.

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "DENY"
    Permissions-Policy = "geolocation=(), camera=(), microphone=(), payment=(), interest-cohort=()"
